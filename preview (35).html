<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Math Speed Test</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    background: #0b0f17;
    color: #e5e7eb;
    display: grid;
    place-items: center;
    height: 100vh;
}

.card {
    width: 400px;
    background: #111827;
    border: 1px solid #1f2937;
    border-radius: 14px;
    padding: 22px;
}

.top {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: #9ca3af;
    margin-bottom: 18px;
}

.timer {
    color: #60a5fa;
    font-variant-numeric: tabular-nums;
}

.question {
    text-align: center;
    font-size: 42px;
    font-weight: 700;
    margin: 22px 0;
}

input {
    width: 100%;
    padding: 14px;
    font-size: 18px;
    text-align: center;
    border-radius: 10px;
    border: 1px solid #2a3446;
    background: #0f1624;
    color: white;
    outline: none;
}

input:focus {
    border-color: #60a5fa;
}

button {
    width: 100%;
    margin-top: 14px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #60a5fa;
    font-weight: 600;
    cursor: pointer;
}

button:disabled {
    opacity: 0.4;
}

.hint {
    text-align: center;
    font-size: 12px;
    color: #6b7280;
    margin-top: 8px;
}

.result {
    text-align: center;
    margin-top: 14px;
    font-size: 14px;
    color: #cbd5e1;
}
</style>
</head>

<body>

<div class="card">
    <div class="top">
        <div id="progress">Press Start</div>
        <div class="timer" id="timer">0.00s</div>
    </div>

    <div class="question" id="question">Ready?</div>

    <input id="input" type="number" disabled autocomplete="off"/>

    <div class="hint">Press Enter to submit</div>

    <button id="startBtn" onclick="startGame()">Start</button>

    <div class="result" id="result"></div>
</div>

<script>
let a, b, op, correct;
let index = 0;
let startTime;
let interval;

const input = document.getElementById("input");

function rand(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

function generateQuestion() {
    const ops = ["+", "-", "*", "/"];
    op = ops[Math.floor(Math.random() * ops.length)];

    // REAL difficulty increase
    if (op === "+") {
        a = rand(20, 150);
        b = rand(20, 150);
        correct = a + b;
    }

    else if (op === "-") {
        a = rand(20, 200);
        b = rand(20, 200);
        correct = a - b; // negative allowed
    }

    else if (op === "*") {
        a = rand(10, 25);
        b = rand(10, 25);
        correct = a * b;
    }

    else if (op === "/") {
        correct = rand(5, 20);
        b = rand(5, 20);
        a = correct * b; // clean division but bigger numbers
    }

    document.getElementById("question").textContent = `${a} ${op} ${b}`;
}

function startGame() {
    index = 0;

    document.getElementById("result").textContent = "";
    document.getElementById("startBtn").disabled = true;

    input.disabled = false;
    input.value = "";
    input.focus();

    startTime = Date.now();

    interval = setInterval(() => {
        const t = (Date.now() - startTime) / 1000;
        document.getElementById("timer").textContent = t.toFixed(2) + "s";
    }, 50);

    generateQuestion();
    updateUI();
}

function submit() {
    if (input.disabled) return;

    const val = Number(input.value);

    if (val === correct) {
        index++;
    }

    input.value = "";

    if (index >= 10) {
        endGame();
        return;
    }

    generateQuestion();
    updateUI();
    input.focus();
}

function updateUI() {
    document.getElementById("progress").textContent =
        `Question ${index + 1}/10`;
}

function endGame() {
    clearInterval(interval);

    const time = (Date.now() - startTime) / 1000;

    document.getElementById("question").textContent = "Done!";
    document.getElementById("result").textContent =
        `Finished in ${time.toFixed(2)} seconds`;

    input.disabled = true;
    document.getElementById("startBtn").disabled = false;
}

input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") submit();
});
</script>

</body>
</html>
